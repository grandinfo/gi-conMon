# ?????? ${VAR_NAME} ????

server:
  bind: "0.0.0.0:11080"
  external_url: "http://localhost:11080"
  tls:
    enabled: false
    # cert_file: "/etc/conmon/server.crt"
    # key_file:  "/etc/conmon/server.key"
  auth:
    jwt_secret: "${JWT_SECRET}"
    token_expire: "24h"

storage:
  # ?? SQLite?????/?????
  type: "sqlite"
  path: "/var/lib/conmon/conmon.db"

  # ?? PostgreSQL??????????? sqlite ???
  # type: "postgresql"
  # dsn: "postgres://conmon:${DB_PASSWORD}@localhost:5432/conmon?sslmode=require"

  timeseries:
    type: "none"
    # ?? InfluxDB ????
    # type: "influxdb"
    # url: "http://localhost:8086"
    # token: "${INFLUXDB_TOKEN}"
    # org: "conmon"
    # bucket: "conmon_metrics"
    batch_size: 1000
    flush_interval: "500ms"

  retention:
    raw: "168h"     # 7 ?
    events: "2160h" # 90 ?
    alerts: "4320h" # 180 ?

probe:
  id: "probe-local-01"
  name: "????"
  location: "??"
  isp: ""
  tags: []
  concurrency: 100
  buffer_size: 100000

# ??????
monitors:
  - name: "?? ICMP"
    target: "www.baidu.com"
    protocol: "icmp"
    interval: "30s"
    timeout: "5s"
    tags: ["??", "???"]

  - name: "?? HTTPS"
    target: "www.baidu.com"
    protocol: "https"
    port: 443
    interval: "1m"
    timeout: "10s"
    tags: ["??", "???", "HTTPS"]
    probe_config:
      path: "/"
      expected_codes: [200]
      cert_warn_days: 30

  - name: "Google DNS"
    target: "8.8.8.8"
    protocol: "dns"
    port: 53
    interval: "1m"
    tags: ["??", "DNS"]
    probe_config:
      query_type: "A"
      query_domain: "example.com"

  - name: "?? HTTP"
    target: "localhost"
    protocol: "http"
    port: 11080
    interval: "15s"
    timeout: "3s"
    tags: ["??", "???"]
    probe_config:
      path: "/health"
      expected_codes: [200]

alerting:
  channels:
    # ????????????? Webhook URL?
    # - name: "????"
    #   type: "dingtalk"
    #   config:
    #     webhook: "${DINGTALK_WEBHOOK_URL}"
    #     secret: "${DINGTALK_SECRET}"

    # ???????
    # - name: "????"
    #   type: "wecom"
    #   config:
    #     webhook: "${WECOM_WEBHOOK_URL}"

    # ?? Webhook
    # - name: "??? Webhook"
    #   type: "webhook"
    #   config:
    #     url: "https://your-system.com/api/alert"

  rules:
    - name: "??????"
      condition: "event.to_status == 'DOWN'"
      channels: []   # ???????????
      severity: "error"
      throttle: "10m"

    - name: "??????"
      condition: "event.to_status == 'UP' && event.from_status == 'DOWN'"
      channels: []
      severity: "info"

log:
  level: "info"   # debug | info | warn | error
  format: "json"  # json | text
  output: "stdout"

debug:
  pprof: false
  pprof_addr: "127.0.0.1:6060"
